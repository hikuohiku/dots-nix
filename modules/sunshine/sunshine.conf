# Sunshine 設定（生ファイル / home-manager で ~/.config/sunshine/sunshine.conf に symlink）
# 用途: hikuo-desktop の HDMI-A-1 (4K) を iPhone から Moonlight で「閲覧のみ」
# 音声・入力は使わないのでサーバ側で無効化し、過去の音声ノイズ/カーソルずれ問題を回避する。

sunshine_name = hikuo-desktop

# キャプチャ対象モニタ（wlr は Wayland monitor list のインデックスで指定）
#   Monitor 0 = DP-1     (Dell S2722DC, 2560x1440)
#   Monitor 1 = HDMI-A-1 (Dell S2722QC, 3840x2160)  ← これを使う
output_name = 1

# Web UI の言語
locale = ja

# wlroots 系 (niri) の Wayland screencopy でキャプチャ
capture = wlr

# NVENC (GPU エンコード)。package を cudaSupport=true でビルドして有効化している。
encoder = nvenc

# 音声は配信しない（iPhone では見るだけ）
stream_audio = disabled

# 入力: マウスのみ有効。HDMI-A-1 は scale 2(整数倍)なので、過去にあった
# フラクショナルスケーリング(scale 1.5)起因のカーソル座標ずれは起きにくい。
# キーボード・ゲームパッドは使わないので無効。
mouse = enabled
keyboard = disabled
controller = disabled
