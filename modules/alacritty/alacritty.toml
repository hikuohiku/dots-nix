[cursor.style]
blinking = "On"
shape = "Beam"

[cursor.vi_mode_style]
shape = "Block"

[env]
TERM = "alacritty"

[colors.primary]
background = "#101010"
foreground = "#f2f2f2"

[font]
size = 9

[font.offset]
x = -1
y = 0

[font.normal]
family = "PlemolJP Console NF"
style = "Medium"

[font.bold]
family = "PlemolJP Console NF"
style = "Bold"

[font.italic]
family = "PlemolJP Console NF"
style = "Medium Italic"

[font.bold_italic]
family = "PlemolJP Console NF"
style = "Bold Italic"

[window]
blur = true
opacity = 0.7
option_as_alt = "Both"

[window.padding]
x = 8
y = 8
